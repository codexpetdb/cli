# Generated by my-setup-gh (biome path)
# pre-commit: biome lint and format on staged files
# pre-push:   typecheck
# commit-msg: commitlint conventional

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "**/*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
