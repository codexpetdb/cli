name: Publish
run-name: Publish ${{ inputs.tag }} (${{ inputs.correlation || 'manual' }})

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed release tag
        required: true
        type: string
      correlation:
        description: Optional dispatch correlation identifier
        required: false
        type: string

concurrency:
  group: npm-publish-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: 26.4.0
          registry-url: https://registry.npmjs.org
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
          test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = tag
          test "$(git rev-parse HEAD)" = "$(git rev-parse "${RELEASE_TAG}^{}")"
          git fetch --no-tags origin refs/heads/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse FETCH_HEAD)"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm pack:smoke
      - run: pnpm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
