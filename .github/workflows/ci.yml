name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: 26.4.0
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm pack:smoke
